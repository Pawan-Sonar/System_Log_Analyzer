name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-build:
    name: Backend Install Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Syntax check
        run: |
          python -m py_compile backend/server.py backend/auth.py backend/analytics.py backend/routers.py

  analytics-build:
    name: Analytics Service Install Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install analytics dependencies
        run: pip install -r analytics-service/requirements.txt
      - name: Syntax check
        run: python -m py_compile analytics-service/service.py

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install frontend dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile
      - name: Build production bundle
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: http://localhost:8001
          CI: "false"
        run: yarn build
