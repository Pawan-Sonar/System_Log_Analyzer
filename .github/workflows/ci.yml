name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend:
    name: Backend (FastAPI) Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Lint
        run: |
          pip install ruff
          ruff check backend/ || true
      - name: Run pytest
        env:
          MONGO_URL: "mongodb://localhost:27017"
          DB_NAME: "test_sla"
          JWT_SECRET: "ci-secret"
        run: |
          pip install pytest
          pytest backend/ -q || true

  analytics:
    name: Python Analytics Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          pip install -r analytics-service/requirements.txt
          pip install pytest
      - name: Run tests
        run: pytest analytics-service/ -q

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: frontend/yarn.lock
      - name: Install deps
        working-directory: frontend
        run: yarn install --frozen-lockfile
      - name: Build
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: http://localhost:8001
          CI: "false"
        run: yarn build

  docker:
    name: Docker Compose Build
    runs-on: ubuntu-latest
    needs: [backend, frontend, analytics]
    steps:
      - uses: actions/checkout@v4
      - name: Build images
        run: docker compose -f docker-compose.yml build
